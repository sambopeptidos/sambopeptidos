
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sambo Péptidos</title>

<!-- Google Fonts CORRECTO -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">

<style>
body {
  margin: 0;
  background:#0b0b0b;
  color:#ffffff;
  font-family:'Inter',sans-serif;
}

/* HEADER */
header {
  background:#000;
  padding:40px 0 28px;
  text-align:center;
}
header img { max-width:220px; }

/* NAV */
nav {
  display:flex;
  justify-content:center;
  gap:14px;
  padding:14px;
  background:linear-gradient(180deg,#0c2338,#081728);
}
nav button {
  background:none;
  border:none;
  color:#cfd9e0;
  padding:10px 20px;
  border-radius:14px;
  cursor:pointer;
  font-size:14px;
}
nav button.active {
  background:#fff;
  color:#000;
  font-weight:600;
}

/* PAGE SYSTEM */
.page {
  display:none;
  max-width:1200px;
  margin:auto;
  padding:60px 20px;
}
.page.active { display:block; }

/* CATALOGO */
.catalog-wrapper {
  display:grid;
  grid-template-columns:1fr 1.3fr;
  gap:40px;
}
.catalog-info {
  background:#f4f6f8;
  color:#0b0b0b;
  padding:48px;
  border-radius:20px;
}
.catalog-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:26px;
}

/* PRODUCT */
.product {
  background:#1a1a1a;
  padding:28px;
  border-radius:18px;
}
.product img {
  width:100%;
  border-radius:14px;
  margin-bottom:12px;
}
.product a {
  display:inline-block;
  margin-top:12px;
  background:#25D366;
  color:#fff;
  padding:10px 22px;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
}

/* FOOTER */
footer {
  text-align:center;
  padding:40px 20px;
  color:#777;
}

/* WHATSAPP FLOAT */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  width:56px;
  height:56px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.whatsapp img { width:28px; }
</style>
</head>

<body>

<header>
  <img src="Designer (6).png" alt="Sambo Péptidos">
</header>

<nav>
  <button class="active" onclick="openPage('catalogo',this)">Catálogo</button>
  <button onclick="openPage('protocolos',this)">Protocolos</button>
  <button onclick="openPage('reconstitucion',this)">Reconstitución</button>
  <button onclick="openPage('envios',this)">Envíos & Pagos</button>
  <button onclick="openPage('contacto',this)">Contáctanos</button>
</nav>

<section id="catalogo" class="page active">
  <div class="catalog-wrapper">

    <div class="catalog-info">
      <h1>Péptidos Sambo<br>Resultados Reales</h1>
      <p>Formulaciones científicas para optimización corporal.</p>
    </div>

    <div class="catalog-grid">

      <div class="product">
        <h3>Tirzepatide</h3>
        <img src="images/tirzepatide.jpg">
        <a href="https://wa.me/593989949501?text=Hola%20quiero%20Tirzepatide" target="_blank">Consultar</a>
      </div>

      <div class="product">
        <h3>Retatrutide</h3>
        <img src="images/retatrutide.jpg">
        <a href="https://wa.me/593989949501?text=Hola%20quiero%20Retatrutide" target="_blank">Consultar</a>
      </div>

      <div class="product">
        <h3>Semaglutide</h3>
        <img src="images/semaglutide.jpg">
        <a href="https://wa.me/593989949501?text=Hola%20quiero%20Semaglutide" target="_blank">Consultar</a>
      </div>

    </div>
  </div>
</section>

<section id="protocolos" class="page"><h1>Protocolos</h1></section>
<section id="reconstitucion" class="page"><h1>Reconstitución</h1></section>
<section id="envios" class="page"><h1>Envíos & Pagos</h1></section>
<section id="contacto" class="page"><h1>Contáctanos</h1></section>

<footer>
  Sambo Péptidos · Samborondón
</footer>

<a class="whatsapp" href="https://wa.me/593989949501" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<script>
function openPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
</script>

</body>
</html>
