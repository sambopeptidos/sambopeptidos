
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sambo Péptidos</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: Arial, sans-serif;
}

/* HEADER SOLO CON LOGO */
.site-header {
  background: #000;
  padding: 24px;
  display: flex;
  justify-content: center;
}

.logo {
  max-width: 240px;
  height: auto;
}

/* HERO */
.hero {
  padding: 30px;
  text-align: center;
}

.section-title {
  padding: 10px 20px;
  font-size: 20px;
  color: #ccc;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 16px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #777;
}

/* WHATSAPP */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 56px;
  height: 56px;
  background: #25D366;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 14px rgba(0,0,0,0.5);
}
.whatsapp-float img {
  width: 28px;
}
</style>
</head>

<body>

<header class="site-header">
  <img src="Designer (4).png" alt="Sambo Péptidos" class="logo">
</header>

<div class="hero">
  <h1>Optimiza tu físico</h1>
  <p>Péptidos premium | Envíos a todo Ecuador</p>
</div>

<div class="section-title">🔥 Pérdida de grasa</div>
<div class="products">
  <div class="card">
    <h3>Tirzepatide</h3>
    <p>Reduce apetito y grasa corporal</p>
    <a class="btn" href="https://wa.me/593989949501">Comprar</a>
  </div>
</div>

<footer>
Sambo Péptidos | Samborondón<br>
<small>Productos de investigación. No son medicamentos.</small>
</footer>

<a class="whatsapp-float" href="https://wa.me/593989949501">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

</body>
</html>
